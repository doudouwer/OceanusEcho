services:
  neo4j:
    image: neo4j:5.16.0
    container_name: oceanecho-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt 协议 (用于连接)
    environment:
      - NEO4J_AUTH=neo4j/password
      # 未安装 APOC：避免首次启动时联网下载插件卡在 "Starting"、且 docker logs 长时间无输出（本项目后端 Cypher 不依赖 APOC）
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-proxy -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  neo4j_data:
  neo4j_logs:
