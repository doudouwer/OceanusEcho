version: '3.8'

services:
  neo4j:
    image: neo4j:5.16.0
    container_name: oceanecho-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt 协议 (用于连接)
    environment:
      - NEO4J_AUTH=neo4j/password
      # 勿设置 NEO4J_PLUGINS：官方镜像在 Neo4j 已启动后会再次跑插件安装脚本，
      # 触发 “Neo4j is already running (pid:7)” 并使容器以 exit 1 退出。
      # 本仓库查询未依赖 APOC；若需要 APOC，请改用 neo4j.conf 挂载或镜像内文档推荐方式安装。
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
